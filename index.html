<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1020" />
  <title>Race Pack — Trip Packing Checklist</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Race Pack" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>🏁 Race Pack</h1>
    <p class="subtitle">Pack smart for every race weekend</p>
  </header>

  <main>
    <section class="card" id="form-card">
      <div class="field">
        <label for="circuit">Where's the race?</label>
        <select id="circuit"></select>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="from">From</label>
          <input type="date" id="from" />
        </div>
        <div class="field">
          <label for="to">To</label>
          <input type="date" id="to" />
        </div>
      </div>

      <div class="field">
        <label for="days">Number of days</label>
        <input type="number" id="days" min="1" max="14" value="2" inputmode="numeric" />
        <p class="hint">Pick dates above and this fills in automatically.</p>
      </div>

      <div class="field">
        <label for="weather">Weather</label>
        <select id="weather">
          <option value="hot">🔥 Hot (&gt;23°C)</option>
          <option value="sunny" selected>☀️ Sunny</option>
          <option value="mixed">⛅ Mixed</option>
          <option value="rainy">🌧️ Rainy</option>
          <option value="cold">❄️ Cold</option>
        </select>
        <button type="button" id="use-forecast" class="btn-forecast">🌤️ Use forecast</button>
        <p class="hint" id="forecast-status"></p>
      </div>

      <button id="generate" class="btn-primary">Generate checklist</button>
    </section>

    <section class="card hidden" id="result-card">
      <div class="result-head">
        <div>
          <h2 id="result-title">Your checklist</h2>
          <p class="result-meta" id="result-meta"></p>
        </div>
        <span class="progress-badge" id="progress-badge">0%</span>
      </div>
      <div id="all-packed" class="all-packed hidden">🎉 You're all packed — have a great race!</div>
      <div id="checklist"></div>
      <div class="result-actions">
        <button id="reset-ticks" class="btn-secondary">Uncheck all</button>
        <button id="edit" class="btn-secondary">Edit trip</button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <span id="install-hint"></span>
  </footer>

  <script src="packing-rules.js"></script>
  <script src="app.js"></script>
  <script>
    // Register the service worker in production only. On localhost we skip it (and
    // unregister any existing one) so code edits always show up on reload.
    (function () {
      if (!('serviceWorker' in navigator)) return;
      var host = location.hostname;
      var isLocal = host === 'localhost' || host === '127.0.0.1' || host === '';
      if (isLocal) {
        navigator.serviceWorker.getRegistrations().then(function (regs) {
          regs.forEach(function (r) { r.unregister(); });
        });
        return;
      }
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('service-worker.js');
      });
    })();
  </script>
</body>
</html>
